<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Pixel Studio</title>
  <!-- GitHub Pages SPA redirect: send all 404s back to index with the path preserved -->
  <script>
    const path = window.location.pathname + window.location.search;
    const hash = encodeURIComponent(path);
    window.location.replace('/?p=' + hash + window.location.hash);
  </script>
</head>
<body></body>
</html>
